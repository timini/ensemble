# Firebase App Hosting configuration for Ensemble AI
# https://firebase.google.com/docs/app-hosting/configure

# Monorepo: Backend rootDirectory is set to "/" (repo root) via Firebase API
# so the buildpack finds package-lock.json at the workspace root.
# The Next.js app is at packages/app.

scripts:
  buildCommand: npm run build --workspace=@ensemble-ai/shared-utils && npm run build --workspace=@ai-ensemble/app
  runCommand: node packages/app/.next/standalone/packages/app/server.js

runConfig:
  cpu: 1
  memoryMiB: 2048
  minInstances: 1
  maxInstances: 10
  concurrency: 80

env:
  - variable: NODE_ENV
    value: production
    availability:
      - RUNTIME

  - variable: NEXT_TELEMETRY_DISABLED
    value: "1"
    availability:
      - BUILD

  - variable: SKIP_ENV_VALIDATION
    value: "true"
    availability:
      - BUILD

  - variable: HOSTNAME
    value: "0.0.0.0"
    availability:
      - RUNTIME

  - variable: PORT
    value: "8080"
    availability:
      - RUNTIME
