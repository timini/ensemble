[project]
name = "ensemble-eval-dspy"
version = "0.1.0"
description = "DSPy-based ensemble evaluation: compare single model vs optimized self-similar ensemble"
requires-python = ">=3.10"
dependencies = [
    "dspy>=2.6",
    "datasets>=3.0",
    "click>=8.0",
]

[project.scripts]
eval-dspy = "eval_dspy.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/eval_dspy"]
